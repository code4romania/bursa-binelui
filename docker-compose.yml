version: '3'

services:
  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
      - .env.local
    ports:
      - 80
    depends_on:
      - database
      - elasticsearch
      - redis

  database:
    image: mysql/mysql-server:${DATABASE_VERSION:-8.0}
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=${DATABASE_NAME:-ChangeMe}
      - MYSQL_USER=${DATABASE_USERNAME:-ChangeMe}
      - MYSQL_PASSWORD=${DATABASE_PASSWORD:-ChangeMe}

  elasticsearch:
    image: elasticsearch:7.17.9
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: "-Xmx256m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  redis:
    image: redis:alpine

volumes:
  db-data:
  elasticsearch-data:
