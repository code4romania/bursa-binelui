version: '3'

services:
  mailer:
    image: mailhog/mailhog:latest
    ports:
      - '8083:8025'

  database:
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=bursa_binelui
    ports:
      - '8084:5432'

  elasticsearch:
    ports:
      - '9200:9200'

  webserver:
    image: nginx:alpine
    working_dir: /application
    volumes:
      - '.:/application'
      - './docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf'
    ports:
      - '8080:80'

  php-fpm:
    build: docker/php-fpm
    working_dir: /application
    volumes:
      - '.:/application'
      - './docker/php-fpm/php-ini-overrides.ini:/etc/php/8.2/fpm/conf.d/99-overrides.ini'

  builder:
    image: node:alpine
    working_dir: /build/assets/website
    command: sh -c "npm ci --no-audit --ignore-scripts && npm run watch"
    volumes:
      - '.:/build'
